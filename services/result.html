<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat - MediaTrust</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #1e3a5f;
            margin-bottom: 1rem;
        }
        .score {
            font-size: 3rem;
            font-weight: bold;
            margin: 1.5rem 0;
        }
        .score.authentique { color: #2ecc71; }
        .score.douteux { color: #f39c12; }
        .score.falsifie { color: #e74c3c; }
        .details {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 20px;
            margin: 1.5rem 0;
        }
        .btn-retour {
            background: #3A7CA5;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .btn-retour:hover {
            transform: scale(1.02);
            background: #2c5282;
        }
        .file-info {
            background: #e8f0fe;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Résultat de l'analyse</h1>
        
        <div class="file-info" id="fileInfo">
            <!-- Infos du fichier chargées ici -->
        </div>
        
        <div class="score" id="scoreDisplay">
            <!-- Score affiché ici -->
        </div>
        
        <div class="details" id="detailsDisplay">
            <!-- Détails de l'analyse -->
        </div>
        
        <button class="btn-retour" onclick="window.location.href='index.html'">
            ← Retour à l'accueil
        </button>
    </div>

    <script>
        // Récupérer les données passées dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        
        const fileName = urlParams.get('name') || 'Fichier inconnu';
        const fileSize = urlParams.get('size') || '0';
        const fileType = urlParams.get('type') || 'inconnu';
        const authenticityScore = urlParams.get('score') || '75';
        
        // Afficher les infos du fichier
        document.getElementById('fileInfo').innerHTML = `
            📄 <strong>${fileName}</strong><br>
            📦 ${(fileSize / 1024).toFixed(1)} Ko • ${fileType}
        `;
        
        // Déterminer le niveau d'authenticité
        let scoreClass = '';
        let scoreMessage = '';
        let detailsText = '';
        
        if (authenticityScore >= 80) {
            scoreClass = 'authentique';
            scoreMessage = '✅ Authentique';
            detailsText = 'Ce fichier semble authentique. Aucune modification suspecte détectée.';
        } else if (authenticityScore >= 50) {
            scoreClass = 'douteux';
            scoreMessage = '⚠️ Douteux';
            detailsText = 'Ce fichier présente quelques anomalies. Une vérification approfondie est recommandée.';
        } else {
            scoreClass = 'falsifie';
            scoreMessage = '❌ Potentiellement falsifié';
            detailsText = 'Des incohérences ont été détectées. Ce fichier a probablement été modifié.';
        }
        
        document.getElementById('scoreDisplay').innerHTML = `
            ${scoreMessage}<br>
            <span style="font-size: 1.2rem;">Score de confiance : ${authenticityScore}%</span>
        `;
        document.getElementById('scoreDisplay').className = `score ${scoreClass}`;
        
        document.getElementById('detailsDisplay').innerHTML = `
            <strong>🔍 Détails de l'analyse :</strong><br><br>
            ${detailsText}<br><br>
            • Hash SHA-256 : ${Math.random().toString(36).substring(2, 42)}<br>
            • Date d'analyse : ${new Date().toLocaleString()}<br>
            • Méthode : Détection de modifications pixel / métadonnées
        `;
    </script>
</body>
</html>
