<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique des analyses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📜 Historique</h1>
        <a href="/">← Retour à l'accueil</a>

        {% if history_list %}
            <ul>
            {% for item in history_list %}
                <li>{{ item.fichier }} – Score : {{ item.score }} – Certifié : {{ item.c2pa_certified }}</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>Aucune analyse enregistrée pour le moment.</p>
        {% endif %}
    </div>
</body>
</html>
